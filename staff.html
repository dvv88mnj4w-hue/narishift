<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<script src="auth.js"></script>


<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ナリシフト｜スタッフ画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header class="header">

<p class="hospital-name">なりた犬猫病院</p>

<h1 class="title">シフト管理システム</h1>

</header>


<div class="card">

<h2>

シフト希望提出

</h2>

<p class="deadline-note">

📌 毎月15日締切です。16日以降は入力・変更・取消ができなくなります。

</p>

<label>

スタッフ

</label>

<div class="custom-select" id="staffSelect">

    <div class="custom-select-trigger" id="staffTrigger">
        <span id="staffTriggerText">スタッフを選択してください</span>
        <span class="custom-select-arrow">▾</span>
    </div>

    <div class="custom-select-options" id="staffOptions"></div>

</div>


</div>


<div class="card">

<div class="month-nav">
    <button id="prevMonthBtn" class="month-nav-btn no-print">◀</button>
    <h2 id="monthTitle">2026年7月</h2>
    <button id="nextMonthBtn" class="month-nav-btn no-print">▶</button>
</div>

<div id="calendar">

</div>

</div>



<div class="card">

<h2>

シフト入力

</h2>

<p>

選択日：

<span id="selectedDate">

未選択

</span>

</p>

<br>

<label>

希望区分

</label>

<select id="shiftType">

<option value="">

選択してください

</option>

<option value="勤務">

勤務

</option>


<option value="有給">

有給

</option>

</select>

<label>

勤務パターン

</label>

<select id="workPattern">

</select>

<label>

備考

</label>

<textarea
id="memo"
rows="4"
placeholder="備考を入力してください"></textarea>

<br><br>

<button id="saveButton">

保存

</button>

<button id="cancelButton" class="cancel-button">

取消

</button>

</div>
<div class="card" id="confirmedArea" style="display:none;">

    <h2>

        確定シフト（全員分）

    </h2>

    <p>

        <span id="confirmedMonthLabel"></span>のシフトが確定しました。

    </p>

    <div style="margin-top:15px;">
        <div class="staff-list-item"><span class="staff-dot" style="background:#2196F3;"></span>山本</div>
        <div class="staff-list-item"><span class="staff-dot" style="background:#F44336;"></span>吉田</div>
        <div class="staff-list-item"><span class="staff-dot" style="background:#FBC02D;"></span>市川</div>
        <div class="staff-list-item"><span class="staff-dot" style="background:#4CAF50;"></span>中村</div>
        <div class="staff-list-item"><span class="staff-dot" style="background:#9C27B0;"></span>杉浦</div>
    </div>

    <div id="confirmedCalendar" style="margin-top:15px;"></div>

</div>

<div style="margin-top:30px;">

<button onclick="goHome()">

← トップへ戻る

</button>

</div>

</div>

<script src="staffData.js"></script>

<script src="script.js"></script>

<script src="calendar.js"></script>

</body>

</html>
