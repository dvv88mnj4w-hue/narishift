<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | ナリタシフト</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ナリタシフト">
    <meta name="theme-color" content="#5fc9c0">
</head>

<body>

<div class="top-page">

    <div class="top-header-image"></div>

    <section class="hero login-hero">

        <div class="lock-icon-wrap">
            <img src="images/lock-icon.png" alt="鍵アイコン">
        </div>

        <div class="login-card">

            <p id="loginErrorMsg" class="login-error" style="display:none;">合言葉が違います</p>

            <input type="password" id="loginPasswordInput" placeholder="合言葉を入力してください" autocomplete="off">

            <button id="loginSubmitButton">入る</button>

        </div>

    </section>

    <div class="top-footer-image"></div>

</div>

<script src="script.js"></script>
<script src="auth.js"></script>

</body>
</html>
