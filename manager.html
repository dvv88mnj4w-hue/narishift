<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>管理者画面 | ナリシフト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- ヘッダー -->

    <header class="header">

        <div class="hospital-name">

            なりた犬猫病院

        </div>

       <h1 class="title">

    シフト管理システム

</h1>

<p class="subtitle">

    管理者画面｜スタッフ希望一覧

</p>


    </header>

    <!-- 戻る -->

    <div style="margin-bottom:25px;">

        <button onclick="goHome()">

            ← トップへ戻る

        </button>

    </div>

    <!-- スタッフ色分け -->

 <div class="card">

    <h2>

        スタッフ

    </h2>

    <br>

    <div class="staff-list-item"><span class="staff-dot" style="background:#2196F3;"></span>山本</div>
    <div class="staff-list-item"><span class="staff-dot" style="background:#F44336;"></span>吉田</div>
    <div class="staff-list-item"><span class="staff-dot" style="background:#FBC02D;"></span>市川</div>
    <div class="staff-list-item"><span class="staff-dot" style="background:#4CAF50;"></span>中村</div>
    <div class="staff-list-item"><span class="staff-dot" style="background:#9C27B0;"></span>杉浦</div>

</div>

    <!-- カレンダー -->

    <div class="card">

        <h2 id="monthTitle">

            今月の希望一覧

        </h2>

        <div id="calendar">

            <!-- calendar.js が生成 -->

        </div>

    </div>

</div>

<script src="staffData.js"></script>
<script src="script.js"></script>
<script src="calendar.js"></script>

</body>

</html>
