<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>管理者画面 | ナリシフト</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- ヘッダー -->

    <header class="header">

        <div class="hospital-name">

            なりた犬猫病院

        </div>

        <h1 class="title">

            管理者画面

        </h1>

        <p class="subtitle">

            スタッフ希望一覧

        </p>

    </header>

    <!-- 戻る -->

    <div style="margin-bottom:25px;">

        <button onclick="goHome()">

            ← トップへ戻る

        </button>

    </div>

    <!-- スタッフ色分け -->

    <div class="card">

        <h2>

            スタッフ

        </h2>

        <br>

        <p>🔵 山本</p>

        <p>🔴 吉田</p>

        <p>🟡 市川</p>

        <p>🟢 中村</p>

        <p>🟣 杉浦</p>

    </div>

    <!-- カレンダー -->

    <div class="card">

        <h2 id="monthTitle">

            今月の希望一覧

        </h2>

        <div id="calendar">

            <!-- calendar.js が生成 -->

        </div>

    </div>

</div>

<script src="staffData.js"></script>
<script src="script.js"></script>
<script src="calendar.js"></script>

</body>

</html>
