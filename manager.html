<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>管理者画面 | ナリシフト</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- ヘッダー -->

    <header class="header no-print">

        <div class="hospital-name">

            なりた犬猫病院

        </div>

        <h1 class="title">

            シフト管理システム

        </h1>

        <p class="subtitle">

            管理者画面｜スタッフ希望一覧

        </p>

    </header>

    <!-- 戻る・印刷 -->

    <div class="no-print" style="margin-bottom:25px; display:flex; gap:10px;">

        <button onclick="goHome()">

            ← トップへ戻る

        </button>

        <button onclick="window.print()">

            🖨 印刷する

        </button>

    </div>

   <!-- スタッフ色分け -->

<div class="card">

    <h2>

        スタッフ

    </h2>

    <br>

    <div id="staffColorList"></div>

</div>

<!-- スタッフ管理 -->

<div class="card no-print">

    <h2>

        スタッフ管理

    </h2>

    <label>名前</label>
    <input type="text" id="newStaffName" placeholder="例：田中">

    <label>色</label>
    <input type="color" id="newStaffColor" value="#00acc1" style="width:80px; padding:4px;">

    <label>勤務パターン（カンマ区切りで複数可）</label>
    <input type="text" id="newStaffPatterns" placeholder="例：8:30～12:30, 13:00～17:00">

    <button id="addStaffButton">追加する</button>

    <div id="staffManageList" style="margin-top:20px;"></div>

</div>


    <!-- シフト確定 -->

    <div class="card no-print">

        <h2>

            シフト確定

        </h2>

        <p>

            確定すると、その月のデータは編集できなくなります。

        </p>

        <p style="margin-top:10px;">

            状態：<span id="confirmStatus">未確定</span>

        </p>

        <br>

        <button id="confirmButton">

            この月を確定する

        </button>

    </div>

    <!-- カレンダー -->

    <div class="card">

        <h2 id="monthTitle">

            今月の希望一覧

        </h2>

        <div id="calendar">

            <!-- calendar.js が生成 -->

        </div>

    </div>

</div>

<script src="staffData.js"></script>
<script src="script.js"></script>
<script src="calendar.js"></script>

</body>

</html>
