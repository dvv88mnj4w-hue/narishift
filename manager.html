<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <script src="auth.js"></script>
    <script>checkAdminAuth();</script>
    

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>管理者画面 | ナリタシフト</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<script type="module" src="firebase-init.js"></script>

    <link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ナリタシフト">

<meta name="theme-color" content="#5fc9c0">

</head>

<body>

<div class="container">

    <!-- ヘッダー -->

    <header class="header no-print">

        <div class="hospital-name">

            なりた犬猫病院

        </div>

        <h1 class="title">

            シフト管理システム

        </h1>

        <p class="subtitle">

            管理者画面｜スタッフ希望一覧

        </p>

    </header>

    <!-- 戻る・印刷 -->

    <div class="no-print" style="margin-bottom:25px; display:flex; gap:10px;">

        <button onclick="goHome()">

            ← トップへ戻る

        </button>

        <button onclick="window.print()">

            🖨 印刷する

        </button>

    </div>

   <!-- スタッフ色分け -->

<div class="card">

    <h2>

        スタッフ

    </h2>

    <br>

    <div id="staffColorList"></div>

</div>

<!-- スタッフ管理 -->

<div class="card no-print">

    <h2>

        スタッフ管理

    </h2>

    <label>名前</label>
    <input type="text" id="newStaffName" placeholder="例：田中">

    <label>色</label>
    <input type="color" id="newStaffColor" value="#00acc1" style="width:80px; padding:4px;">

    <label>勤務パターン（カンマ区切りで複数可）</label>
    <input type="text" id="newStaffPatterns" placeholder="例：8:30～12:30, 13:00～17:00">

    <button id="addStaffButton">追加する</button>

    <div id="staffManageList" style="margin-top:20px;"></div>

</div>


    <!-- シフト確定 -->

    <div class="card no-print">

        <h2>

            シフト確定

        </h2>

        <p>

            確定すると、その月のデータは編集できなくなります。

        </p>

        <p style="margin-top:10px;">

            状態：<span id="confirmStatus">未確定</span>

        </p>

        <br>

    <button id="confirmButton">

        この月を確定する

    </button>

    <div style="height:10px;"></div>

    <button id="unconfirmButton" class="cancel-button">

        確定を解除する

    </button>

</div>


<!-- 管理者編集 -->

<div class="card no-print">

    <h2>

        スタッフの代理編集

    </h2>

    <p>

        締切後でもここから編集できます。確定済みの月は、先に「確定を解除」してください。

    </p>

    <label>スタッフ</label>

    <div class="custom-select" id="adminStaffSelect">

        <div class="custom-select-trigger" id="adminStaffTrigger">
            <span id="adminStaffTriggerText">スタッフを選択してください</span>
            <span class="custom-select-arrow">▾</span>
        </div>

        <div class="custom-select-options" id="adminStaffOptions"></div>

    </div>

   <div id="adminCalendarArea" style="display:none;">

            <div class="calendar-scroll" style="margin-top:15px;">

                <div id="adminCalendar"></div>

            </div>
            

        <div style="margin-top:20px;">

            <p>選択日：<span id="adminSelectedDate">未選択</span></p>

            <label>希望区分</label>

            <select id="adminShiftType">
                <option value="">選択してください</option>
                <option value="勤務">勤務</option>
                <option value="有給">有給</option>
            </select>

            <label>勤務パターン</label>

            <select id="adminWorkPattern"></select>

            <label>備考</label>

            <textarea id="adminMemo" rows="3" placeholder="備考を入力してください"></textarea>

            <br><br>

            <button id="adminSaveButton">保存</button>
            <button id="adminCancelButton" class="cancel-button">取消</button>

        </div>

    </div>

</div>

<!-- カレンダー -->

    <div class="card">

        <div class="month-nav">
            <button id="prevMonthBtn" class="month-nav-btn no-print">◀</button>
            <h2 id="monthTitle">今月の希望一覧</h2>
            <button id="nextMonthBtn" class="month-nav-btn no-print">▶</button>
        </div>

        <div class="calendar-scroll">

            <div id="calendar">

                <!-- calendar.js が生成 -->

            </div>

        </div>

    </div>


</div>

<script src="staffData.js"></script>
<script src="script.js"></script>
<script src="calendar.js"></script>

</body>

</html>
